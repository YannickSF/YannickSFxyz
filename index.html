<!doctype html>
<html lang="fr">

<head>
    <meta charset="utf-8">
    <title>Yannick S. F</title>
    <link rel="icon" type="image/png" href="asset/favicon.ico">
    <meta name="author" content="Yannick S. FELER">
    <meta name="description" content="Yannick S. F Développeur Logicielle Full Stack">
    <meta name="twitter:title" content="Yannick S. F Développeur Logicielle Full Stack">

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.3/css/bulma.min.css">

    <style>
        h1 {
            font-size: 20px;
            color: #f01120;
        }
        
        body,
        html {
            background: #080707;
            margin: 0;
            padding: 0;
            font-family: 'Open sans', sans-serif;
        }
        
        header {
            margin-top: 3em;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        header>img {
            width: 7em;
            height: 7em;
            border-radius: 100%;
            border: 2px solid #ff0d0d;
        }
        
        header>h1 {
            margin-top: 2em;
            display: inline-block;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 1em;
            background-color: #000a;
            color: #ff0d0d;
            padding: 0.3em 0.6em;
            border: 1px solid #fff;
        }
        
        footer {
            color: #fffa;
            margin-top: 2em;
            margin-bottom: 2em;
            padding-top: 5%;
            padding-bottom: 5%;
            display: flex;
            flex-direction: row;
            justify-content: center;
        }
    </style>

</head>

<body>
    <div class="container" style="width: 50%;">

        <header>
            <h1>Chat</h1>
        </header>

        <div id="app" class="container">

            <hr>
            <script src="/socket.io/socket.io.js"></script>
            <div class="container">
                <div class="field">
                    <label class="label" style="color:#f01120">Username</label>
                    <div class="control">
                        <input id="user" style="width:50%;" class="input" type="text" placeholder="Text input">
                    </div>
                </div>
                <div class="field">
                    <label class="label" style="color:#f01120">Message</label>
                    <div class="control">
                        <input id="msg" class="input" type="text" placeholder="Text input">
                    </div>
                </div>
                <button class="button is-danger" @click="sendMessage()">Send</button>
            </div>
            <hr>

            <script>
                var socket = io();
                socket.on('tlg', function(item) {
                    let ul = document.getElementById("chat");
                    let li = document.createElement("li");
                    li.appendChild(document.createTextNode(item.user + ' - ' + item.msg));
                    ul.appendChild(li);
                })
            </script>
            <ul id="chat"></ul>


        </div>
        <script>
            const {
                createApp
            } = Vue

            createApp({
                data() {
                    return {
                        user: ''
                    }
                },
                methods: {
                    sendMessage() {
                        this.user = document.getElementById('user').value;
                        let msg = document.getElementById('msg').value;
                        socket.emit('tlg', {
                            'user': this.user,
                            'msg': msg
                        });
                    }
                }
            }).mount('#app')
        </script>

        <hr>
        <footer>
            <p>
                <Strong>Forge by </Strong><a href="https://link.yannicksf.xyz" style="color: #ff0d0d;">Yannick <strong style="color:#ffdf0d;">S.</strong>F</a>
            </p>
        </footer>

    </div>

</body>

</html>
